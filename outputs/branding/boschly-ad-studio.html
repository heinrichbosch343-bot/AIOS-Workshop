<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boschly — Ad Composition Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..600&family=Instrument+Serif:ital@0;1&family=Playfair+Display:ital,wght@0,400..800;1,400..600&family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --navy-0:#070b16;--navy-1:#0a1020;--blue:#3b82f6;--blue-300:#93c5fd;--blue-400:#60a5fa;
    --line:rgba(255,255,255,0.10);--text:#eef2fb;--dim:#9fb0cc;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:#05070d;color:var(--text);font-family:'Inter',system-ui,Arial,sans-serif;min-height:100vh}
  .wrap{display:grid;grid-template-columns:1fr 380px;min-height:100vh}
  @media(max-width:1100px){.wrap{grid-template-columns:1fr}}

  /* ---------- stage ---------- */
  .left{display:flex;align-items:center;justify-content:center;padding:32px;background:radial-gradient(80% 80% at 50% 20%,#0b1020,#05070d)}
  #stage{position:relative;display:inline-block;max-width:100%;box-shadow:0 30px 80px rgba(0,0,0,.6);border-radius:6px;overflow:hidden}
  #stage img#bg{display:block;max-width:100%;max-height:82vh}
  /* legibility scrims */
  .scrim{position:absolute;inset:0;pointer-events:none;opacity:1;transition:.2s}
  .scrim.bottom{background:linear-gradient(0deg,rgba(4,6,12,.86) 0%,rgba(4,6,12,.5) 26%,transparent 52%)}
  .scrim.left{background:linear-gradient(90deg,rgba(4,6,12,.82) 0%,rgba(4,6,12,.35) 34%,transparent 60%)}
  .scrim.full{background:rgba(4,6,12,.42)}
  .scrim.off{opacity:0}

  /* headline block */
  #copy{position:absolute;z-index:4;max-width:62%;padding:0;pointer-events:none}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-weight:500;text-transform:uppercase;
    color:var(--blue-300);display:none;align-items:center;gap:12px;margin-bottom:18px}
  .eyebrow.on{display:flex}
  .eyebrow .rule{width:30px;height:1px;background:linear-gradient(90deg,var(--blue-300),transparent)}
  .headline{color:#fff;text-wrap:balance}
  .headline .em{font-style:italic}
  .subline{color:#cfd9ec;margin-top:16px;font-family:'Inter';font-weight:300;display:none}
  .subline.on{display:block}

  /* watermark */
  #wm{position:absolute;z-index:5;display:flex;align-items:center;gap:10px;opacity:.95;pointer-events:none}
  #wm .name{font-family:'Space Grotesk';font-weight:600;letter-spacing:-.02em;color:#fff}

  /* ---------- panel ---------- */
  .right{border-left:1px solid var(--line);padding:24px 22px 60px;overflow-y:auto;max-height:100vh}
  h1{font-family:'Space Grotesk';font-weight:600;font-size:18px;letter-spacing:-.02em}
  h1 .b{color:var(--blue-400)}
  .hint{color:var(--dim);font-size:12px;margin:6px 0 20px;line-height:1.5}
  .grp{margin-bottom:22px}
  .grp>label{display:block;font:500 11px 'JetBrains Mono',monospace;letter-spacing:.22em;
    text-transform:uppercase;color:var(--blue-300);margin-bottom:10px}
  .drop{border:1.5px dashed var(--line);border-radius:12px;padding:26px;text-align:center;color:#7f93b4;
    font-size:13px;cursor:pointer;transition:.15s}
  .drop:hover{border-color:rgba(96,165,250,.5);color:#cfe0ff}
  textarea,select,input[type=text]{width:100%;background:#0e1320;color:#eef2fb;border:1px solid var(--line);
    border-radius:9px;padding:10px 12px;font:400 13px 'Inter';resize:vertical}
  textarea{min-height:54px;line-height:1.4}
  .quotes{display:flex;flex-direction:column;gap:7px;margin-top:10px}
  .q{text-align:left;font:400 13px 'Inter';color:#c4d2ea;background:rgba(255,255,255,.02);
    border:1px solid var(--line);border-radius:9px;padding:9px 11px;cursor:pointer;transition:.12s;line-height:1.35}
  .q:hover{background:rgba(59,130,246,.14);border-color:rgba(96,165,250,.4)}
  .q.sel{background:rgba(59,130,246,.2);border-color:var(--blue)}
  .chips{display:flex;flex-wrap:wrap;gap:7px}
  .chip{font:500 12px 'Inter';color:#9fb0cc;background:transparent;border:1px solid var(--line);
    border-radius:20px;padding:7px 13px;cursor:pointer;transition:.12s}
  .chip:hover{color:#cfe0ff;border-color:rgba(96,165,250,.5)}
  .chip.sel{background:var(--blue);border-color:var(--blue);color:#fff}
  .row{display:flex;gap:10px;align-items:center;margin-bottom:9px;font:500 11px 'JetBrains Mono';color:#8ea3c4}
  .row input[type=range]{flex:1;accent-color:var(--blue)}
  .corner-grid{display:grid;grid-template-columns:repeat(3,30px);grid-template-rows:repeat(3,30px);gap:5px}
  .corner-grid div{border:1px solid var(--line);border-radius:5px;cursor:pointer;transition:.12s}
  .corner-grid div:hover{border-color:rgba(96,165,250,.5)}
  .corner-grid div.on{background:var(--blue);border-color:var(--blue)}
  .btn{width:100%;font:600 14px 'Inter';color:#fff;background:linear-gradient(120deg,#2563eb,#3b82f6);
    border:none;padding:13px;border-radius:11px;cursor:pointer;margin-top:6px}
  .btn:hover{filter:brightness(1.08)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:#9fb0cc;font-weight:500;margin-top:9px}
  .toggle{display:flex;gap:8px;align-items:center;font-size:12.5px;color:#c4d2ea;cursor:pointer;margin-bottom:8px}
  .toggle input{accent-color:var(--blue);width:15px;height:15px}
</style>
</head>
<body>
<div class="wrap">
  <!-- ================= STAGE ================= -->
  <div class="left">
    <div id="stage">
      <div class="drop" id="dropBig" style="width:560px;max-width:80vw;padding:90px 30px">
        <b style="color:#cfe0ff">Drop your image here</b><br>or click to choose<br>
        <span style="font-size:11.5px;opacity:.7">use the office / dashboard shot you generated</span>
        <input type="file" id="file" accept="image/*" hidden />
      </div>
    </div>
  </div>

  <!-- ================= PANEL ================= -->
  <div class="right">
    <h1>Boschly <span class="b">·</span> Ad Studio</h1>
    <p class="hint">Drop the image, pick a line, choose a font treatment, place the watermark. Export when it looks like an ad you'd pay for.</p>

    <div class="grp">
      <label>Headline</label>
      <textarea id="copyText" placeholder="Type a headline, or pick one below">One system. The whole team aligned.</textarea>
      <div class="quotes" id="quoteList"></div>
    </div>

    <div class="grp">
      <label>Font treatment</label>
      <div class="chips" id="fontChips"></div>
    </div>

    <div class="grp">
      <label>Size &amp; layout</label>
      <div class="row">Size <input type="range" id="size" min="3" max="11" step="0.1" value="6"></div>
      <div class="row">Width <input type="range" id="maxw" min="35" max="85" value="60"></div>
      <div class="row">Tracking <input type="range" id="track" min="-4" max="40" value="0"></div>
      <div class="row">Line height <input type="range" id="lh" min="90" max="160" value="108"></div>
    </div>

    <div class="grp">
      <label>Position</label>
      <div class="corner-grid" id="corners">
        <div data-c="tl"></div><div data-c="tc"></div><div data-c="tr"></div>
        <div data-c="ml"></div><div data-c="mc"></div><div data-c="mr"></div>
        <div data-c="bl" class="on"></div><div data-c="bc"></div><div data-c="br"></div>
      </div>
    </div>

    <div class="grp">
      <label>Scrim (legibility)</label>
      <div class="chips" id="scrimChips">
        <div class="chip sel" data-s="bottom">Bottom fade</div>
        <div class="chip" data-s="left">Left fade</div>
        <div class="chip" data-s="full">Dim all</div>
        <div class="chip" data-s="off">None</div>
      </div>
    </div>

    <div class="grp">
      <label>Extras</label>
      <label class="toggle"><input type="checkbox" id="eyebrowOn"> Kicker line above</label>
      <input type="text" id="eyebrowText" value="BOSCHLY  ·  AI OPERATING SYSTEMS" style="margin-bottom:10px">
      <label class="toggle"><input type="checkbox" id="sublineOn"> Sub-line below</label>
      <input type="text" id="sublineText" value="Custom AI that runs your whole business." style="margin-bottom:10px">
      <label class="toggle"><input type="checkbox" id="wmOn" checked> Boschly watermark (bottom-right)</label>
    </div>

    <button class="btn" onclick="exportAd()">⬇ Download the ad (2×)</button>
    <button class="btn ghost" onclick="resetAll()">Clear image</button>
  </div>
</div>

<script>
/* ---------------- curated headlines (centralized-system theme) ---------------- */
const QUOTES = [
  "One system. The whole team aligned.",
  "When everything connects, nothing slips.",
  "Your entire business, run from one place.",
  "One source of truth. Everyone moves as one.",
  "The whole company, finally on the same page.",
  "Every part of the business, one mind.",
  "Connect the work. Free the people.",
  "One center. Total clarity.",
];

/* ---------------- font treatments ---------------- */
const FONTS = {
  "Editorial serif": {ff:"'Fraunces',serif", w:380, italic:false, upper:false, track:-1, lh:104,
    em:true /* allow italic emphasis on a word */},
  "Quiet luxury":    {ff:"'Instrument Serif',serif", w:400, italic:true, upper:false, track:0, lh:106},
  "Classic display": {ff:"'Playfair Display',serif", w:500, italic:false, upper:false, track:-1, lh:104},
  "Modern caps":     {ff:"'Space Grotesk',sans-serif", w:600, italic:false, upper:true, track:16, lh:118},
  "Clean sans":      {ff:"'Space Grotesk',sans-serif", w:600, italic:false, upper:false, track:-2, lh:106},
};
let currentFont = "Editorial serif";

/* ---------------- mark (vector swirl, white) ---------------- */
function markWhite(size){
  let petals='';const blade="M60 60 C 64 41 81 33 99 41 C 90 51 76 55 60 60 Z";
  for(let i=0;i<6;i++) petals+=`<path d="${blade}" transform="rotate(${i*60} 60 60)"/>`;
  return `<svg width="${size}" height="${size}" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">
    <defs><radialGradient id="wmg" cx="50%" cy="50%" r="62%">
      <stop offset="0%" stop-color="#fff"/><stop offset="65%" stop-color="#fff" stop-opacity=".92"/>
      <stop offset="100%" stop-color="#fff" stop-opacity=".6"/></radialGradient></defs>
    <g fill="url(#wmg)">${petals}</g><circle cx="60" cy="60" r="9" fill="#fff"/></svg>`;
}

/* ---------------- build panel controls ---------------- */
const qList=document.getElementById('quoteList');
QUOTES.forEach(q=>{
  const d=document.createElement('div');d.className='q';d.textContent=q;
  d.onclick=()=>{document.getElementById('copyText').value=q;markSel();render();};
  qList.appendChild(d);
});
function markSel(){const v=document.getElementById('copyText').value.trim();
  document.querySelectorAll('.q').forEach(e=>e.classList.toggle('sel',e.textContent===v));}

const fChips=document.getElementById('fontChips');
Object.keys(FONTS).forEach((k,i)=>{
  const d=document.createElement('div');d.className='chip'+(i===0?' sel':'');d.textContent=k;
  d.onclick=()=>{currentFont=k;document.querySelectorAll('#fontChips .chip').forEach(c=>c.classList.remove('sel'));
    d.classList.add('sel');applyFontDefaults();render();};
  fChips.appendChild(d);
});
function applyFontDefaults(){const f=FONTS[currentFont];
  document.getElementById('track').value=f.track;
  document.getElementById('lh').value=f.lh;}

let scrim='bottom';
document.querySelectorAll('#scrimChips .chip').forEach(c=>c.onclick=()=>{
  document.querySelectorAll('#scrimChips .chip').forEach(x=>x.classList.remove('sel'));
  c.classList.add('sel');scrim=c.dataset.s;render();});

let corner='bl';
document.querySelectorAll('#corners div').forEach(c=>c.onclick=()=>{
  document.querySelectorAll('#corners div').forEach(x=>x.classList.remove('on'));
  c.classList.add('on');corner=c.dataset.c;render();});

['copyText','size','maxw','track','lh','eyebrowText','sublineText'].forEach(id=>
  document.getElementById(id).addEventListener('input',()=>{markSel();render();}));
['eyebrowOn','sublineOn','wmOn'].forEach(id=>
  document.getElementById(id).addEventListener('change',render));

/* ---------------- image load ---------------- */
const fileInput=document.getElementById('file');
document.getElementById('dropBig').addEventListener('click',()=>fileInput.click());
const stage=document.getElementById('stage');
stage.addEventListener('dragover',e=>e.preventDefault());
stage.addEventListener('drop',e=>{e.preventDefault();if(e.dataTransfer.files[0])loadImg(e.dataTransfer.files[0]);});
fileInput.addEventListener('change',e=>{if(e.target.files[0])loadImg(e.target.files[0]);});

let loaded=false;
function loadImg(file){
  const r=new FileReader();
  r.onload=()=>{
    stage.innerHTML=`<img id="bg"><div class="scrim bottom" id="scrimEl"></div>
      <div id="copy"><div class="eyebrow" id="eb"></div><div class="headline" id="hl"></div><div class="subline" id="sl"></div></div>
      <div id="wm"></div>`;
    const img=document.getElementById('bg');img.onload=()=>{loaded=true;render();};img.src=r.result;
  };
  r.readAsDataURL(file);
}

/* ---------------- render ---------------- */
function render(){
  if(!loaded)return;
  const img=document.getElementById('bg');
  const W=img.clientWidth,H=img.clientHeight;
  const f=FONTS[currentFont];

  // scrim
  const se=document.getElementById('scrimEl');
  se.className='scrim '+scrim;

  // headline
  const hl=document.getElementById('hl');
  const sizePct=+document.getElementById('size').value;
  const fontPx=W*sizePct/100;
  hl.style.fontFamily=f.ff;
  hl.style.fontWeight=f.w;
  hl.style.fontStyle=f.italic?'italic':'normal';
  hl.style.textTransform=f.upper?'uppercase':'none';
  hl.style.letterSpacing=(+document.getElementById('track').value/100)+'em';
  hl.style.lineHeight=(+document.getElementById('lh').value/100);
  hl.style.fontSize=fontPx+'px';
  hl.textContent=document.getElementById('copyText').value;

  // copy block width + position
  const copy=document.getElementById('copy');
  copy.style.maxWidth=document.getElementById('maxw').value+'%';
  placeBlock(copy,corner,W,H);

  // eyebrow
  const eb=document.getElementById('eb');
  eb.className='eyebrow'+(document.getElementById('eyebrowOn').checked?' on':'');
  eb.style.fontSize=Math.max(10,fontPx*0.2)+'px';
  eb.style.letterSpacing='0.28em';
  eb.innerHTML=document.getElementById('eyebrowOn').checked?
    `<span>${document.getElementById('eyebrowText').value}</span><span class="rule"></span>`:'';

  // subline
  const sl=document.getElementById('sl');
  sl.className='subline'+(document.getElementById('sublineOn').checked?' on':'');
  sl.style.fontSize=Math.max(11,fontPx*0.34)+'px';
  sl.textContent=document.getElementById('sublineText').value;

  // watermark
  const wm=document.getElementById('wm');
  if(document.getElementById('wmOn').checked){
    const ms=Math.max(20,W*0.032);
    wm.style.display='flex';
    wm.innerHTML=`${markWhite(ms)}<span class="name" style="font-size:${ms*0.62}px">Boschly</span>`;
    wm.style.right=(W*0.04)+'px';wm.style.bottom=(H*0.045)+'px';
    wm.style.left='auto';wm.style.top='auto';
  } else wm.style.display='none';
}

function placeBlock(el,c,W,H){
  const px=W*0.06,py=H*0.07;
  el.style.left=el.style.right=el.style.top=el.style.bottom='auto';el.style.transform='none';el.style.textAlign='left';
  // vertical
  if(c[0]==='t')el.style.top=py+'px';
  else if(c[0]==='b')el.style.bottom=py+'px';
  else {el.style.top='50%';el.style.transform='translateY(-50%)';}
  // horizontal
  if(c[1]==='l')el.style.left=px+'px';
  else if(c[1]==='r'){el.style.right=px+'px';el.style.textAlign='right';}
  else {el.style.left='50%';el.style.textAlign='center';
    el.style.transform=(c[0]==='m'?'translate(-50%,-50%)':'translateX(-50%)');}
}

/* ---------------- export ---------------- */
function exportAd(){
  if(!loaded){alert('Drop an image first');return;}
  html2canvas(document.getElementById('stage'),{backgroundColor:null,scale:2,useCORS:true,logging:false}).then(c=>{
    const a=document.createElement('a');a.download='boschly-ad.png';a.href=c.toDataURL('image/png');a.click();
  });
}
function resetAll(){location.reload();}
window.addEventListener('resize',render);
applyFontDefaults();markSel();
</script>
</body>
</html>
